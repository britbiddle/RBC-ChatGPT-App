<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reese's Book Club</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --cream: #FAF7F2;
      --warm-white: #FEFCF8;
      --rbc-yellow: #F5E03A;
      --tan: #E8DDD0;
      --bark: #2C1810;
      --stone: #9B8E84;
      --radius: 16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--cream);
      color: var(--bark);
      padding: 16px;
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--tan);
    }
    .header-icon { font-size: 18px; line-height: 1; }
    .header-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--bark);
      letter-spacing: -0.01em;
    }

    /* ── Section label ── */
    .section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--stone);
      margin-bottom: 14px;
    }

    /* ── Shared card shell ── */
    .card {
      background: var(--warm-white);
      border-radius: var(--radius);
      border: 1px solid rgba(232,221,208,0.8);
      box-shadow: 0 2px 12px rgba(44,24,16,0.06);
      overflow: hidden;
      margin-bottom: 14px;
    }

    /* ── Full-width yellow CTA ── */
    .cta-wrap { padding: 0 16px 16px; }
    .cta-btn {
      display: block;
      width: 100%;
      text-align: center;
      background: var(--rbc-yellow);
      color: var(--bark);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 700;
      padding: 13px 16px;
      border-radius: 100px;
      text-decoration: none;
      transition: background 0.15s, transform 0.1s;
    }
    .cta-btn:hover { background: #e8d235; transform: translateY(-1px); }
    .cta-btn:active { transform: translateY(0); }

    /* ── Genre tags ── */
    .genre-tags { display: flex; flex-wrap: wrap; gap: 5px; }
    .genre-tag {
      background: var(--tan);
      color: var(--stone);
      font-size: 10px;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 100px;
    }

    /* ── FEATURED CARD (current pick) ── */
    .featured-badge {
      display: inline-block;
      background: var(--rbc-yellow);
      color: var(--bark);
      font-size: 12px;
      font-weight: 700;
      padding: 6px 14px;
      border-radius: 100px;
      margin: 16px 16px 12px;
    }
    .featured-cover {
      position: relative;
      height: 190px;
      margin: 0 16px 16px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 18px rgba(0,0,0,0.14);
    }
    .featured-cover-genre {
      position: absolute;
      bottom: 10px;
      left: 10px;
      background: rgba(44,24,16,0.6);
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 100px;
      backdrop-filter: blur(4px);
    }
    .featured-info { padding: 0 16px; }
    .featured-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 24px;
      font-weight: 700;
      line-height: 1.15;
      margin-bottom: 4px;
    }
    .featured-author {
      font-size: 14px;
      color: var(--stone);
      margin-bottom: 14px;
    }
    .featured-quote {
      font-family: 'Playfair Display', Georgia, serif;
      font-style: italic;
      font-size: 14px;
      line-height: 1.65;
      color: var(--bark);
      margin-bottom: 18px;
    }

    /* ── BOOK LIST CARD ── */
    .book-row {
      display: flex;
      gap: 14px;
      padding: 16px 16px 12px;
    }
    .book-cover-portrait {
      width: 72px;
      height: 102px;
      border-radius: 8px;
      flex-shrink: 0;
      box-shadow: 2px 4px 12px rgba(0,0,0,0.18);
      display: flex;
      align-items: flex-end;
      padding: 6px;
    }
    .book-cover-label {
      font-family: 'Playfair Display', serif;
      font-size: 7px;
      font-weight: 700;
      color: rgba(255,255,255,0.85);
      line-height: 1.3;
    }
    .book-info { flex: 1; min-width: 0; }
    .book-month {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--stone);
      margin-bottom: 4px;
    }
    .book-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 17px;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 3px;
    }
    .book-author {
      font-size: 13px;
      color: var(--stone);
      margin-bottom: 9px;
    }
    .book-quote {
      padding: 0 16px 14px;
      font-family: 'Playfair Display', Georgia, serif;
      font-style: italic;
      font-size: 13px;
      line-height: 1.6;
      color: var(--stone);
    }

    img.featured-cover {
      width: 100%;
      height: 190px;
      object-fit: cover;
      display: block;
    }
    img.book-cover-portrait {
      width: 72px;
      height: 102px;
      border-radius: 8px;
      object-fit: cover;
      flex-shrink: 0;
      box-shadow: 2px 4px 12px rgba(0,0,0,0.18);
    }

    /* ── PRODUCT CAROUSEL ── */
    .product-carousel {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 8px;
      margin-bottom: 4px;
      scrollbar-width: none;
    }
    .product-carousel::-webkit-scrollbar { display: none; }
    .product-card {
      min-width: 175px;
      max-width: 175px;
      scroll-snap-align: start;
      background: var(--warm-white);
      border-radius: var(--radius);
      border: 1px solid rgba(232,221,208,0.8);
      box-shadow: 0 2px 12px rgba(44,24,16,0.06);
      overflow: hidden;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
    }
    .product-card-img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      display: block;
      flex-shrink: 0;
    }
    .product-card-img-placeholder {
      width: 100%;
      height: 150px;
      flex-shrink: 0;
    }
    .product-body {
      padding: 10px 12px 0;
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .product-category {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--stone);
      margin-bottom: 3px;
    }
    .product-name {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 14px;
      font-weight: 600;
      line-height: 1.25;
      margin-bottom: 2px;
    }
    .product-brand { font-size: 11px; color: var(--stone); margin-bottom: 4px; }
    .product-price { font-size: 13px; font-weight: 700; margin-bottom: 8px; }
    .product-quote {
      font-family: 'Playfair Display', Georgia, serif;
      font-style: italic;
      font-size: 11px;
      line-height: 1.5;
      color: var(--stone);
      margin-bottom: 10px;
      flex: 1;
    }
    .product-cta {
      display: block;
      width: calc(100% - 24px);
      margin: 0 12px 12px;
      text-align: center;
      background: var(--rbc-yellow);
      color: var(--bark);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 700;
      padding: 10px 12px;
      border-radius: 100px;
      text-decoration: none;
    }
    .product-cta:hover { background: #e8d235; }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center;
      padding: 52px 24px;
    }
    .empty-icon { font-size: 44px; margin-bottom: 16px; }
    .empty-text {
      font-family: 'Playfair Display', Georgia, serif;
      font-style: italic;
      font-size: 16px;
      line-height: 1.65;
      color: var(--stone);
      margin-bottom: 24px;
    }
    .empty-cta {
      display: inline-block;
      background: var(--rbc-yellow);
      color: var(--bark);
      font-size: 13px;
      font-weight: 700;
      padding: 11px 24px;
      border-radius: 100px;
      text-decoration: none;
    }

    /* ── NOT FOUND ── */
    .not-found {
      background: var(--warm-white);
      border-radius: var(--radius);
      border: 1px solid var(--tan);
      padding: 28px 24px;
      text-align: center;
    }
    .not-found-text {
      font-family: 'Playfair Display', Georgia, serif;
      font-style: italic;
      font-size: 15px;
      color: var(--stone);
      line-height: 1.65;
    }
  </style>
</head>
<body>

  <div class="header">
    <span class="header-icon">📖</span>
    <span class="header-title">Reese's Book Club</span>
  </div>

  <div id="content">
    <div class="empty-state">
      <div class="empty-icon">📚</div>
      <p class="empty-text">Hmm, I don't have that one in my picks — but let me find you something you'll love just as much.</p>
      <a class="empty-cta" href="#">Get recommendations</a>
    </div>
  </div>

  <script>
    const SERVER = "https://rbc-chatgpt-app-production.up.railway.app";
    const PROTOCOL_VERSION = "2026-01-26";
    let lastTs = 0;

    // ── Postmessage bridge (keep as fallback) ─────────────────────────────────
    function sendMessage(method, params = {}) {
      window.parent.postMessage({ jsonrpc: "2.0", id: Date.now(), method, params }, "*");
    }
    function signalReady() {
      sendMessage("ui/notifications/initialized", { protocolVersion: PROTOCOL_VERSION });
    }
    window.addEventListener("message", (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== "object") return;
      if (msg.method === "ui/initialize") { signalReady(); return; }
      if (msg.method === "ui/notifications/tool-result") {
        const result = msg.params?.result ?? msg.params ?? msg.result;
        const data = result?.structuredContent ?? (result?.type ? result : null);
        if (data?.type) renderContent(data);
      }
    });
    signalReady();

    // ── Poll server directly (bypasses broken postMessage bridge) ─────────────
    async function poll() {
      try {
        const r = await fetch(`${SERVER}/api/latest`);
        const { data, ts } = await r.json();
        if (data && ts > lastTs) {
          lastTs = ts;
          renderContent(data);
        }
      } catch (_) {}
    }
    poll();
    setInterval(poll, 1500);

    // ── Render dispatcher ─────────────────────────────────────────────────────
    function renderContent(data) {
      const root = document.getElementById("content");
      switch (data.type) {
        case "current_pick":      root.innerHTML = renderFeatured(data);        break;
        case "book_recommendations":
        case "search_results":    root.innerHTML = renderBookList(data);        break;
        case "book_detail":       root.innerHTML = renderBookDetail(data.book); break;
        case "product_recommendations": root.innerHTML = renderProducts(data);  break;
        case "not_found":
          root.innerHTML = `<div class="not-found"><p class="not-found-text">${data.message}</p></div>`;
          break;
      }
    }

    function genreTags(genres) {
      return `<div class="genre-tags">${genres.map(g => `<span class="genre-tag">${g}</span>`).join("")}</div>`;
    }

    // ── Featured / current pick ───────────────────────────────────────────────
    function renderFeatured(data) {
      const b = data.book;
      const label = data.monthLabel || "This Month's Pick";
      return `
        <div class="card">
          <span class="featured-badge">${label}</span>
          <div class="featured-cover" style="${b.coverUrl ? '' : 'background:' + b.coverColor}">
            ${b.coverUrl ? `<img src="${b.coverUrl}" alt="${b.title}" style="width:100%;height:100%;object-fit:cover;display:block;">` : ''}
            <span class="featured-cover-genre">${b.genres[0] || "Fiction"}</span>
          </div>
          <div class="featured-info">
            <div class="featured-title">${b.title}</div>
            <div class="featured-author">by ${b.author}</div>
            <p class="featured-quote">"${b.reeseNote}"</p>
          </div>
          <div class="cta-wrap">
            <a href="${b.buyLink}" target="_blank" rel="noopener" class="cta-btn">Get the book →</a>
          </div>
        </div>
      `;
    }

    // ── Book recommendation list ──────────────────────────────────────────────
    function renderBookList(data) {
      const books = data.books;
      if (!books || books.length === 0) {
        return `<div class="empty-state"><div class="empty-icon">🔍</div><p class="empty-text">No books found for that search. Try a different genre or theme!</p></div>`;
      }
      const label = data.filterSummary
        ? `Picks for: ${data.filterSummary}`
        : data.query
        ? `Results for "${data.query}"`
        : "RBC Picks for You";

      return `
        <p class="section-label">${label}</p>
        ${books.map(b => `
          <div class="card">
            <div class="book-row">
              ${b.coverUrl
                ? `<img class="book-cover-portrait" src="${b.coverUrl}" alt="${b.title}">`
                : `<div class="book-cover-portrait" style="background:${b.coverColor}"><span class="book-cover-label">${b.title}</span></div>`
              }
              <div class="book-info">
                ${b.month ? `<div class="book-month">${b.month}</div>` : ""}
                <div class="book-title">${b.title}</div>
                <div class="book-author">by ${b.author}</div>
                ${genreTags(b.genres)}
              </div>
            </div>
            <p class="book-quote">"${b.reeseNote.length > 140 ? b.reeseNote.slice(0, 137) + "…" : b.reeseNote}"</p>
            <div class="cta-wrap">
              <a href="${b.buyLink}" target="_blank" rel="noopener" class="cta-btn">Get the book →</a>
            </div>
          </div>
        `).join("")}
      `;
    }

    // ── Single book detail ────────────────────────────────────────────────────
    function renderBookDetail(b) {
      return `
        <p class="section-label">Book Details</p>
        <div class="card">
          <div class="book-row">
            ${b.coverUrl
              ? `<img class="book-cover-portrait" src="${b.coverUrl}" alt="${b.title}">`
              : `<div class="book-cover-portrait" style="background:${b.coverColor}"><span class="book-cover-label">${b.title}</span></div>`
            }
            <div class="book-info">
              ${b.month ? `<div class="book-month">${b.month}</div>` : ""}
              <div class="book-title">${b.title}</div>
              <div class="book-author">by ${b.author}</div>
              ${genreTags(b.genres)}
            </div>
          </div>
          <p class="book-quote" style="font-style:normal;color:var(--stone);font-family:'DM Sans',sans-serif;font-size:13px;">${b.description}</p>
          <p class="book-quote">"${b.reeseNote}"</p>
          <div class="cta-wrap">
            <a href="${b.buyLink}" target="_blank" rel="noopener" class="cta-btn">Get the book →</a>
          </div>
        </div>
      `;
    }

    // ── Product recommendations ───────────────────────────────────────────────
    function renderProducts(data) {
      const prods = data.products;
      if (!prods || prods.length === 0) {
        return `<div class="empty-state"><div class="empty-icon">🛍️</div><p class="empty-text">No products found. Try a different category or occasion!</p></div>`;
      }
      const label = data.occasion ? `Perfect for: ${data.occasion}` : "Reese's Picks";

      return `
        <p class="section-label">${label}</p>
        <div class="product-carousel">
          ${prods.map(p => `
            <div class="product-card">
              ${p.imageUrl
                ? `<img class="product-card-img" src="${p.imageUrl}" alt="${p.name}">`
                : `<div class="product-card-img-placeholder" style="background:${p.imageColor}"></div>`
              }
              <div class="product-body">
                <div class="product-category">${p.category}</div>
                <div class="product-name">${p.name}</div>
                ${p.brand ? `<div class="product-brand">${p.brand}</div>` : ""}
                ${p.price ? `<div class="product-price">${p.price}</div>` : ""}
                <p class="product-quote">"${p.whyReeseLovesIt}"</p>
              </div>
              <a href="${p.url}" target="_blank" rel="noopener" class="product-cta">Shop now →</a>
            </div>
          `).join("")}
        </div>
      `;
    }

    sendMessage("ui/initialize", { protocolVersion: PROTOCOL_VERSION });
  </script>
</body>
</html>
